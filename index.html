<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok推流提交</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
  form { max-width: 500px; margin: 0 auto; background: white; padding: 24px; border-radius: 12px; }
  input, select { width: 100%; padding: 12px; margin: 8px 0; font-size: 16px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; }
  button { padding: 12px 24px; font-size: 16px; margin: 8px 4px; border: none; border-radius: 6px; background: #1677ff; color: white; }
  button[type="button"] { background: #52c41a; }
  button.delete-btn { background: #ff4d4f; color: white; padding: 8px 16px; font-size: 14px; }
  button.parse-btn { background: #faad14; color: white; padding: 8px 16px; font-size: 14px; margin-top: 4px; }
  .item-group { background: #fafafa; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #eee; position: relative; }
  .item-group input { margin: 4px 0; }
  .item-group .delete-btn { position: absolute; top: 8px; right: 8px; }
  .video-id-display { font-size: 14px; color: #666; margin-top: 2px; }
  #msg { margin-top: 12px; text-align: center; font-size: 14px; }
</style>
</head>
<body>
  <form id="mainForm">
    <h2 style="text-align:center;">提交TikTok推流</h2>
    <label>用户ID</label>
    <input type="text" id="userId" placeholder="输入用户ID" required>

    <label>素材语言</label>
    <select id="language" required>
      <option value="">请选择</option>
      <option value="英语">英语</option>
      <option value="西班牙语">西班牙语</option>
    </select>

    <label>作品信息</label>
    <div id="itemsContainer">
      <div class="item-group">
        <input type="text" class="item-link" placeholder="作品链接（可粘贴短链接）" required>
        <button type="button" class="parse-btn" onclick="parseLink(this)">自动解析</button>
        <div class="video-id-display"></div>
        <input type="text" class="item-code" placeholder="推流码" required>
        <input type="text" class="item-videoType" placeholder="视频类型" required>
        <button type="button" class="delete-btn" onclick="deleteGroup(this)">删除</button>
      </div>
    </div>
    <button type="button" id="addItemBtn">+ 添加作品</button>
    <button type="submit">提交</button>
    <div id="msg"></div>
  </form>

  <script>
    // ---------- 工具函数 ----------
    function extractVideoId(url) {
      const match = url.match(/\/video\/(\d+)/);
      return match ? match[1] : '';
    }

    async function parseLink(btn) {
      const group = btn.parentElement;
      const linkInput = group.querySelector('.item-link');
      const displayDiv = group.querySelector('.video-id-display');
      const shortLink = linkInput.value.trim();
      if (!shortLink) {
        displayDiv.textContent = '请先输入链接';
        return;
      }
      btn.disabled = true;
      btn.textContent = '解析中...';
      displayDiv.textContent = '';
      try {
        const apiUrl = `https://www.tiktok.com/oembed?url=${encodeURIComponent(shortLink)}`;
        const resp = await fetch(apiUrl);
        if (!resp.ok) throw new Error('API 请求失败');
        const data = await resp.json();
        const fullLink = data.url || shortLink;
        const videoId = extractVideoId(fullLink);
        if (videoId) {
          linkInput.value = fullLink;       // 替换为长链接
          displayDiv.textContent = '视频ID: ' + videoId;
        } else {
          displayDiv.textContent = '未能提取视频ID，请检查链接';
        }
      } catch (err) {
        displayDiv.textContent = '解析失败，请手动粘贴长链接';
      }
      btn.disabled = false;
      btn.textContent = '自动解析';
    }

    // ---------- 动态添加/删除作品组 ----------
    document.getElementById('addItemBtn').addEventListener('click', () => {
      const container = document.getElementById('itemsContainer');
      const group = document.createElement('div');
      group.className = 'item-group';
      group.innerHTML = `<input type="text" class="item-link" placeholder="作品链接（可粘贴短链接）" required>
                         <button type="button" class="parse-btn" onclick="parseLink(this)">自动解析</button>
                         <div class="video-id-display"></div>
                         <input type="text" class="item-code" placeholder="推流码" required>
                         <input type="text" class="item-videoType" placeholder="视频类型" required>
                         <button type="button" class="delete-btn" onclick="deleteGroup(this)">删除</button>`;
      container.appendChild(group);
    });

    function deleteGroup(btn) {
      const container = document.getElementById('itemsContainer');
      const groups = container.querySelectorAll('.item-group');
      if (groups.length <= 1) {
        document.getElementById('msg').textContent = '至少保留一组作品信息';
        return;
      }
      btn.parentElement.remove();
    }

    // ---------- 提交 ----------
    document.getElementById('mainForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = '提交中...';

      const userId = document.getElementById('userId').value.trim();
      const language = document.getElementById('language').value;
      const groups = document.querySelectorAll('.item-group');
      const items = [];

      for (const group of groups) {
        const link = group.querySelector('.item-link').value.trim();
        const code = group.querySelector('.item-code').value.trim();
        const videoType = group.querySelector('.item-videoType').value.trim();
        const videoId = extractVideoId(link);   // 直接从长链接提取
        if (link && code && videoType) {
          items.push({ link, code, videoType, videoId });
        }
      }

      if (!userId || !language || items.length === 0) {
        document.getElementById('msg').textContent = '请完整填写ID、语言及至少一组作品信息';
        btn.disabled = false;
        btn.textContent = '提交';
        return;
      }

      try {
        const resp = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, language, items })
        });
        const data = await resp.json();
        if (resp.ok) {
          document.getElementById('msg').textContent = '提交成功！';
          e.target.reset();
          document.getElementById('itemsContainer').innerHTML = `
            <div class="item-group">
              <input type="text" class="item-link" placeholder="作品链接（可粘贴短链接）" required>
              <button type="button" class="parse-btn" onclick="parseLink(this)">自动解析</button>
              <div class="video-id-display"></div>
              <input type="text" class="item-code" placeholder="推流码" required>
              <input type="text" class="item-videoType" placeholder="视频类型" required>
              <button type="button" class="delete-btn" onclick="deleteGroup(this)">删除</button>
            </div>`;
        } else {
          document.getElementById('msg').textContent = '失败：' + (data.error || '请重试');
        }
      } catch (err) {
        document.getElementById('msg').textContent = '网络错误，请重试';
      }
      btn.disabled = false;
      btn.textContent = '提交';
    });
  </script>
</body>
</html>
