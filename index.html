<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TikTok 推流提交</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- 背景装饰 -->
    <div class="bg-pattern"></div>

    <!-- 主内容容器 -->
    <div class="container">
      <header class="header">
        <h1 class="header__title">📱 TikTok 推流</h1>
        <p class="header__desc">粘贴短链接，自动提取视频ID</p >
      </header>

      <form class="form" id="mainForm">
        <!-- 基本信息卡片 -->
        <section class="card card--basic">
          <h2 class="card__title">
            <span class="card__icon">👤</span> 基本信息
          </h2>
          <div class="form-group">
            <label class="form-group__label" for="userId">用户ID</label>
            <div class="input-wrap">
              <input class="form-group__input" type="text" id="userId" placeholder="输入用户ID" required>
              <button type="button" class="btn-paste" title="粘贴用户ID">📋</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-group__label" for="language">素材语言</label>
            <select class="form-group__select" id="language" required>
              <option value="" disabled selected>请选择语言</option>
              <option value="英语">英语</option>
              <option value="西班牙语">西班牙语</option>
            </select>
          </div>
        </section>

        <!-- 作品信息卡片 -->
        <section class="card card--works">
          <h2 class="card__title">
            <span class="card__icon">🎬</span> 作品信息
          </h2>
          <div class="works-container" id="itemsContainer">
            <!-- 动态插入作品组 -->
          </div>
          <button type="button" class="btn btn--add" id="addItemBtn">
            ＋ 添加作品
          </button>
        </section>

        <!-- 提交按钮 -->
        <button type="submit" class="btn btn--submit">提 交</button>
      </form>
    </div>

    <!-- 弹窗：成功/失败提示 -->
    <div class="modal" id="modal">
      <div class="modal__mask"></div>
      <div class="modal__dialog">
        <div class="modal__content" id="modalContent"></div>
        <button class="modal__close" id="modalClose">确定</button>
      </div>
    </div>
  </div>

  <script>
    // ---------- 工具函数 ----------
    function updateGroupNumbers() {
      const groups = document.querySelectorAll('.work-item');
      groups.forEach((group, index) => {
        const title = group.querySelector('.work-item__title');
        if (title) title.textContent = `作品 #${index + 1}`;
      });
    }

    function createWorkItem(index) {
      const item = document.createElement('div');
      item.className = 'work-item';
      item.innerHTML = `
        <div class="work-item__header">
          <span class="work-item__title">作品 #${index}</span>
          <button type="button" class="work-item__delete" title="删除">✕</button>
        </div>
        <div class="work-item__fields">
          <!-- 作品链接输入框 + 粘贴按钮 -->
          <div class="input-wrap">
            <input type="text" class="form-group__input item-link" placeholder="作品链接（可粘贴短链接）" required>
            <button type="button" class="btn-paste" title="粘贴链接">📋</button>
          </div>
          <!-- 推流码输入框 + 粘贴按钮 -->
          <div class="input-wrap">
            <input type="text" class="form-group__input item-code" placeholder="推流码" required>
            <button type="button" class="btn-paste" title="粘贴推流码">📋</button>
          </div>
          <!-- 视频类型输入框 + 粘贴按钮（非必填，已移除 required） -->
          <div class="input-wrap">
            <input type="text" class="form-group__input item-videoType" placeholder="视频类型（数字）">
            <button type="button" class="btn-paste" title="粘贴视频类型">📋</button>
          </div>
        </div>
      `;
      // 删除事件
      item.querySelector('.work-item__delete').addEventListener('click', () => {
        const container = document.getElementById('itemsContainer');
        const groups = container.querySelectorAll('.work-item');
        if (groups.length <= 1) {
          showModal('至少保留一组作品信息', 'error');
          return;
        }
        item.remove();
        updateGroupNumbers();
      });
      return item;
    }

    // 弹窗控制
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modalContent');
    const modalClose = document.getElementById('modalClose');
    const modalMask = document.querySelector('.modal__mask');

    function showModal(text, type) {
      modalContent.textContent = text;
      modal.className = `modal modal--${type}`;
      modalClose.addEventListener('click', hideModal, { once: true });
      modalMask.addEventListener('click', hideModal, { once: true });
    }

    function hideModal() {
      modal.className = 'modal';
    }

    // ---------- 一键粘贴逻辑 ----------
    async function pasteToInput(inputElement) {
      try {
        const text = await navigator.clipboard.readText();
        if (!text || !text.trim()) {
          showModal('剪贴板为空，请先复制内容', 'error');
          return;
        }
        // 智能提取 TikTok 链接
        const linkMatch = text.match(/https?:\/\/(?:vt\.tiktok\.com|www\.tiktok\.com)\S+/);
        const valueToPaste = linkMatch ? linkMatch[0] : text.trim();
        inputElement.value = valueToPaste;
        inputElement.dispatchEvent(new Event('input', { bubbles: true }));
      } catch (err) {
        showModal('无法读取剪贴板，请手动长按粘贴', 'error');
      }
    }

    // 委托监听所有粘贴按钮
    document.addEventListener('click', function(e) {
      const btn = e.target.closest('.btn-paste');
      if (!btn) return;
      const wrap = btn.closest('.input-wrap');
      const input = wrap ? wrap.querySelector('input') : null;
      if (input) {
        pasteToInput(input);
      }
    });

    // ---------- 初始化 ----------
    const itemsContainer = document.getElementById('itemsContainer');
    itemsContainer.appendChild(createWorkItem(1));

    // 添加作品
    document.getElementById('addItemBtn').addEventListener('click', () => {
      const count = itemsContainer.querySelectorAll('.work-item').length;
      itemsContainer.appendChild(createWorkItem(count + 1));
      updateGroupNumbers();
    });

    // ---------- 提交 ----------
    document.getElementById('mainForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('.btn--submit');
      btn.disabled = true;
      btn.textContent = '提交中...';

      const userId = document.getElementById('userId').value.trim();
      const language = document.getElementById('language').value;
      const groups = document.querySelectorAll('.work-item');
      const items = [];

      for (const group of groups) {
        const link = group.querySelector('.item-link').value.trim();
        const code = group.querySelector('.item-code').value.trim();
        const videoType = group.querySelector('.item-videoType').value.trim();
        // 视频类型改为非必填，只检查 link 和 code
        if (link && code) {
          items.push({ link, code, videoType });
        }
      }

      if (!userId || !language || items.length === 0) {
        showModal('请完整填写基本信息及至少一组作品（作品链接和推流码为必填）', 'error');
        btn.disabled = false;
        btn.textContent = '提 交';
        return;
      }

      try {
        const resp = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, language, items })
        });
        const data = await resp.json();
        if (resp.ok) {
          showModal('✓ 提交成功！', 'success');
          e.target.reset();
          itemsContainer.innerHTML = '';
          itemsContainer.appendChild(createWorkItem(1));
          document.getElementById('language').value = '';
        } else {
          showModal('✗ ' + (data.error || '请重试'), 'error');
        }
      } catch (err) {
        showModal('网络错误，请检查连接', 'error');
      }
      btn.disabled = false;
      btn.textContent = '提 交';
    });
  </script>
</body>
</html>
